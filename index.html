<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Ben's Say It!</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --p1: #ff5fa2;
      --p2: #ffd23f;
      --p3: #3fd0ff;
      --p4: #8a5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, var(--p4), var(--p1), var(--p2), var(--p3));
      background-size: 400% 400%;
      animation: flow 16s ease infinite;
      padding: 26px 16px 60px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(1.7rem, 7vw, 2.6rem);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .sub {
      font-size: clamp(0.9rem, 3.2vw, 1.1rem);
      margin: 8px 0 20px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }

    .face {
      font-size: clamp(4rem, 18vw, 6.5rem);
      margin-bottom: 20px;
    }

    .type-card {
      max-width: 460px;
      margin: 0 auto 22px;
      background: rgba(255,255,255,0.22);
      border: 4px solid #fff;
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.2);
    }
    .say-textarea {
      width: 100%;
      min-height: 110px;
      font-family: inherit;
      font-size: 1.15rem;
      color: #333;
      background: #fff;
      border: 3px solid #fff;
      border-radius: 14px;
      padding: 12px;
      resize: none;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }
    .big-btn {
      font-family: inherit;
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      font-weight: bold;
      color: #fff;
      background: rgba(74,222,128,0.45);
      border: 4px solid #fff;
      border-radius: 999px;
      padding: 16px 34px;
      box-shadow: 0 7px 0 rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .big-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    .small-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.2);
      border: 3px solid #fff;
      border-radius: 999px;
      padding: 12px 22px;
      cursor: pointer;
    }
    .small-btn:active { transform: translateY(3px); }
    .small-btn.stop { background: rgba(255,59,59,0.4); }
  </style>
</head>
<body>
  <h1>🗣️ Ben's Say It! 🗣️</h1>
  <p class="sub">Type something, then press Play to hear it!</p>

  <div class="face" id="face">😀</div>

  <div class="type-card">
    <textarea class="say-textarea" id="sayInput" maxlength="300" placeholder="Type something fun..."></textarea>
  </div>

  <div class="btn-row">
    <button class="big-btn" id="playBtn">▶️ Play</button>
    <button class="small-btn stop" id="stopBtn">⏹️ Stop</button>
    <button class="small-btn" id="clearBtn">🧹 Clear</button>
  </div>

  <script>
    var sayInput = document.getElementById("sayInput");
    var face = document.getElementById("face");

    // Each letter shows the mouth-shape emoji that best matches how you'd say it.
    var LETTER_FACES = {
      a: "😮", o: "😮",       // wide open mouth, like "ah"/"oh"
      e: "😃", i: "😃",       // mouth spread wide showing teeth, with eyes open (not squinted)
      u: "🙂",                // small rounded/pursed mouth, like "oo"
      m: "🙂", b: "🙂", p: "🙂" // lips pressed together
    };
    var DEFAULT_LETTER_FACE = "😀"; // any other letter — an open, talking mouth

    function faceForLetter(ch) {
      return LETTER_FACES[ch.toLowerCase()] || DEFAULT_LETTER_FACE;
    }

    var faceAnimTimer = null;

    function startFaceAnim(text) {
      clearInterval(faceAnimTimer);
      var letters = text.match(/[a-zA-Z]/g) || ["a"]; // one emoji shown per letter
      var msPerLetter = 90; // roughly how long it takes to "say" one letter
      var index = 0;

      face.textContent = faceForLetter(letters[index]);

      faceAnimTimer = setInterval(function () {
        index++;
        if (index >= letters.length) { clearInterval(faceAnimTimer); return; }
        face.textContent = faceForLetter(letters[index]);
      }, msPerLetter);
    }

    function stopFaceAnim() {
      clearInterval(faceAnimTimer);
      face.textContent = "😀";
    }

    function speakText() {
      var text = sayInput.value.trim();
      if (!text) return;

      if (!("speechSynthesis" in window)) {
        alert("Sorry, this device can't talk out loud!");
        return;
      }

      window.speechSynthesis.cancel(); // stop anything already talking

      var utter = new SpeechSynthesisUtterance(text);
      utter.onstart = function () { startFaceAnim(text); };
      utter.onend = stopFaceAnim;
      utter.onerror = stopFaceAnim;

      window.speechSynthesis.speak(utter);
    }

    document.getElementById("playBtn").addEventListener("click", speakText);

    document.getElementById("stopBtn").addEventListener("click", function () {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      stopFaceAnim();
    });

    document.getElementById("clearBtn").addEventListener("click", function () {
      sayInput.value = "";
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      stopFaceAnim();
      sayInput.focus();
    });

    sayInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        speakText();
      }
    });
  </script>
</body>
</html>
